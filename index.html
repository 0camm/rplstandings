<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPL Standings</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red:     #e8001d;
    --red-dim: rgba(232,0,29,.12);
    --bg:      #07070c;
    --surface: #0f0f16;
    --surface2:#161620;
    --surface3:#1c1c28;
    --border:  rgba(255,255,255,.08);
    --border2: rgba(255,255,255,.04);
    --muted:   #56566a;
    --muted2:  #3a3a4e;
    --text:    #e0e0f0;
    --green:   #22c55e;
    --green-dim:rgba(34,197,94,.12);
    --amber:   #f59e0b;
    --amber-dim:rgba(245,158,11,.12);
    --blue:    #60a5fa;
    --blue-dim:rgba(96,165,250,.12);
    --win:     #4ade80;
    --lose:    #f87171;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top:0; z-index:100;
    height: 52px;
    display: flex; align-items:center; justify-content:space-between;
    padding: 0 20px;
    background: rgba(7,7,12,.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-left { display:flex; align-items:center; gap:12px; }

  .nav-logo {
    width:28px; height:28px; border-radius:6px;
    background: var(--red);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:15px; color:#fff;
    letter-spacing:.02em; flex-shrink:0;
  }

  .nav-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:17px; letter-spacing:.08em; color:#fff;
  }
  .nav-title em { color:var(--red); font-style:normal; }

  .nav-pill {
    font-size:10px; font-weight:600; letter-spacing:.08em;
    color:var(--muted); text-transform:uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius:20px; padding:3px 9px;
    display:none;
  }
  @media (min-width:480px) { .nav-pill { display:block; } }

  .nav-right { display:flex; align-items:center; gap:12px; }

  .sync-label { font-size:11px; color:var(--muted); display:none; }
  @media (min-width:600px) { .sync-label { display:block; } }

  .live-pill {
    display:flex; align-items:center; gap:5px;
    font-size:10px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted);
  }
  .live-pill.live { color:var(--green); }
  .live-dot {
    width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0;
  }
  .live-pill.live .live-dot { background:var(--green); animation:pulse 1.8s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }

  /* ── PAGE ── */
  .page { max-width:1340px; margin:0 auto; padding:0 16px 80px; }

  /* ── HERO ── */
  .hero {
    padding: 24px 0 20px;
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:16px;
    border-bottom: 1px solid var(--border2);
    margin-bottom:20px;
    flex-wrap:wrap;
  }

  .hero-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:28px; letter-spacing:.04em; color:#fff; line-height:1;
  }
  .hero-title em { color:var(--red); font-style:normal; }
  .hero-sub { font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:.02em; }

  .playoff-key {
    display:flex; flex-wrap:wrap; gap:10px 18px; align-items:center;
    margin-top:2px;
  }
  .key-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
  .key-pip { width:3px; height:14px; border-radius:2px; flex-shrink:0; }
  .key-pip.z  { background:var(--amber); }
  .key-pip.x  { background:var(--green); }
  .key-pip.pi { background:var(--blue); }
  .key-pip.e  { background:var(--muted2); }

  /* ── ALERT BANNER ── */
  .alert {
    display:none; margin-bottom:16px;
    padding:11px 16px; border-radius:8px;
    font-size:12px; color:var(--muted);
    background:var(--surface); border:1px solid var(--border);
  }
  .alert.show { display:block; }

  /* ── RESULTS STRIP ── */
  #results-strip { display:none; margin-bottom:24px; }

  .strip-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }

  .strip-head {
    display:flex; align-items:center; gap:8px;
    padding:9px 16px;
    border-bottom:1px solid var(--border);
    background:var(--surface2);
  }
  .strip-head-label {
    font-size:10px; font-weight:700; letter-spacing:.14em;
    text-transform:uppercase; color:var(--muted);
  }
  .strip-dot { width:6px; height:6px; border-radius:50%; background:var(--red); }

  .strip-scroll {
    display:flex; overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    gap:0;
  }
  .strip-scroll::-webkit-scrollbar { display:none; }

  .result-card {
    flex-shrink:0; min-width:200px;
    padding:12px 16px;
    border-right:1px solid var(--border2);
    position:relative;
    transition:background .15s;
    cursor:default;
  }
  .result-card:last-child { border-right:none; }
  .result-card:hover { background:rgba(255,255,255,.025); }
  .result-card::before {
    content:''; position:absolute;
    top:0; left:0; right:0; height:2px; border-radius:2px 2px 0 0;
  }
  .result-card.final::before    { background:var(--green); }
  .result-card.forfeit::before  { background:var(--amber); }
  .result-card.incomplete::before { background:var(--muted2); }

  .rc-teams { display:flex; flex-direction:column; gap:6px; }
  .rc-row { display:flex; align-items:center; gap:8px; }
  .rc-logo { width:18px; height:18px; object-fit:contain; flex-shrink:0; }
  .rc-abbr {
    font-family:'Bebas Neue',sans-serif;
    font-size:13px; letter-spacing:.04em; color:#fff; flex:1;
  }
  .rc-score {
    font-size:14px; font-weight:700;
    font-variant-numeric:tabular-nums; min-width:22px; text-align:right;
    color:var(--muted);
  }
  .rc-score.w { color:var(--win); }

  .rc-meta {
    margin-top:8px; display:flex; align-items:center; justify-content:space-between;
  }
  .rc-badge {
    font-size:9px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; padding:2px 6px; border-radius:4px;
  }
  .rc-badge.final   { background:var(--green-dim); color:var(--green); }
  .rc-badge.forfeit { background:var(--amber-dim); color:var(--amber); }
  .rc-badge.incomplete { background:rgba(82,82,110,.2); color:var(--muted); }
  .rc-badge.ot      { background:var(--blue-dim); color:var(--blue); }
  .rc-note { font-size:10px; color:var(--muted); max-width:90px; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ── CONFERENCES ── */
  .conferences {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:24px;
  }
  @media (max-width:900px) {
    .conferences { grid-template-columns:1fr; gap:18px; }
  }

  .conf-label {
    display:flex; align-items:center; gap:10px; margin-bottom:10px;
  }
  .conf-tag {
    font-size:9px; font-weight:700; letter-spacing:.14em;
    text-transform:uppercase; padding:3px 9px; border-radius:4px;
  }
  .conf-tag.east { background:rgba(232,0,29,.15); color:var(--red); border:1px solid rgba(232,0,29,.25); }
  .conf-tag.west { background:rgba(96,165,250,.12); color:var(--blue); border:1px solid rgba(96,165,250,.2); }
  .conf-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:20px; letter-spacing:.04em; color:#fff;
  }

  /* ── TABLE ── */
  .tbl {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }

  .tbl-head {
    display:grid;
    grid-template-columns: 28px 34px 1fr 44px 44px 60px 56px;
    padding:8px 14px;
    border-bottom:1px solid var(--border);
    background:var(--surface2);
  }
  .tbl-head span {
    font-size:10px; font-weight:600; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted);
    text-align:center;
  }
  .tbl-head span:nth-child(3) { text-align:left; }

  .tbl-row {
    display:grid;
    grid-template-columns: 28px 34px 1fr 44px 44px 60px 56px;
    padding:9px 14px;
    align-items:center;
    border-bottom:1px solid var(--border2);
    position:relative; transition:background .14s;
  }
  .tbl-row:last-child { border-bottom:none; }
  .tbl-row:hover { background:rgba(255,255,255,.022); }

  .tbl-row::before {
    content:''; position:absolute;
    left:0; top:0; bottom:0; width:3px;
  }
  .tbl-row.s-z::before  { background:var(--amber); }
  .tbl-row.s-x::before  { background:var(--green); }
  .tbl-row.s-pi::before { background:var(--blue); }

  @keyframes rowFlash {
    0% { background:rgba(232,0,29,.14); }
    100% { background:transparent; }
  }
  .tbl-row.flash { animation:rowFlash 1.6s ease forwards; }

  /* eliminated dim */
  .tbl-row.s-e .r-name,
  .tbl-row.s-e .r-w,
  .tbl-row.s-e .r-l,
  .tbl-row.s-e .r-pct { color:#3a3a50; }

  .r-rank { font-size:12px; font-weight:600; color:var(--muted); text-align:center; }

  .r-logo { display:flex; align-items:center; justify-content:center; }
  .r-logo img { width:22px; height:22px; object-fit:contain; display:block; }
  .r-logo .placeholder {
    width:22px; height:22px; border-radius:50%;
    background:var(--surface3);
  }

  .r-team {}
  .r-name {
    font-size:13px; font-weight:600; color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .r-meta { display:flex; align-items:center; gap:5px; margin-top:1px; }
  .r-abbr { font-size:10px; color:var(--muted); letter-spacing:.04em; }

  .r-badge {
    font-size:9px; font-weight:700; letter-spacing:.06em;
    padding:1px 5px; border-radius:3px; flex-shrink:0;
  }
  .r-badge.z  { background:var(--amber-dim); color:var(--amber); }
  .r-badge.x  { background:var(--green-dim); color:var(--green); }
  .r-badge.pi { background:var(--blue-dim); color:var(--blue); }
  .r-badge.e  { display:none; }

  .r-w, .r-l, .r-pct {
    text-align:center;
    font-variant-numeric:tabular-nums;
    font-size:13px;
  }
  .r-w { color:var(--win); font-weight:600; }
  .r-l { color:var(--lose); font-weight:600; }
  .r-pct { color:var(--text); }

  .r-strk {
    text-align:center;
    font-size:12px; font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .r-strk.w { color:var(--win); }
  .r-strk.l { color:var(--lose); }
  .r-strk.n { color:var(--muted); }

  /* ── TOAST ── */
  #toasts {
    position:fixed; bottom:20px; right:16px;
    display:flex; flex-direction:column-reverse; gap:8px;
    z-index:9999; pointer-events:none;
    max-width: min(300px, calc(100vw - 32px));
  }
  .toast {
    background:var(--surface2);
    border:1px solid var(--border);
    border-left:3px solid var(--red);
    border-radius:8px; padding:10px 14px;
    font-size:13px; color:#fff;
    box-shadow:0 8px 32px rgba(0,0,0,.5);
    pointer-events:all;
    animation:toastIn .22s ease;
  }
  .toast.green { border-left-color:var(--green); }
  .toast.amber { border-left-color:var(--amber); }
  .toast.out   { animation:toastOut .22s ease forwards; }
  @keyframes toastIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-5px)} }

  /* ── MOBILE ── */
  @media (max-width:640px) {
    .hero { padding:18px 0 16px; }
    .hero-title { font-size:24px; }
    .playoff-key { gap:8px 14px; }

    /* hide only the streak column; keep logos */
    .tbl-head,
    .tbl-row {
      grid-template-columns: 20px 28px 1fr 36px 36px 50px;
    }
    .tbl-head span:last-child,
    .r-strk { display:none; }

    .r-logo img { width:18px; height:18px; }
    .r-logo .placeholder { width:18px; height:18px; }
    .r-name { font-size:12px; }
    .tbl-head { padding:7px 10px; }
    .tbl-row  { padding:8px 10px; }
    .result-card { min-width:175px; padding:10px 13px; }
  }

  @media (max-width:380px) {
    .hero-title { font-size:21px; }
    .conf-name { font-size:18px; }
    .playoff-key .key-item:nth-child(3),
    .playoff-key .key-item:nth-child(4) { display:none; }
  }

  /* ── RESULT CARD CLICKABLE ── */
  .result-card.clickable { cursor:pointer; }
  .result-card.clickable:hover { background:rgba(255,255,255,.045); }
  .rc-click-hint {
    font-size:9px; color:var(--muted2); letter-spacing:.06em;
    text-transform:uppercase; margin-top:6px; text-align:center;
    opacity:.7;
  }

  /* ── BOX SCORE MODAL ── */
  .modal-backdrop {
    position:fixed; inset:0; z-index:2000;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:16px;
    opacity:0; pointer-events:none;
    transition:opacity .22s ease;
  }
  .modal-backdrop.open { opacity:1; pointer-events:all; }

  .modal {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px; overflow:hidden;
    width:100%; max-width:820px;
    max-height:90vh; display:flex; flex-direction:column;
    transform:translateY(14px) scale(.98);
    transition:transform .22s ease;
    box-shadow:0 32px 80px rgba(0,0,0,.7);
  }
  .modal-backdrop.open .modal { transform:translateY(0) scale(1); }

  .modal-header {
    padding:16px 20px;
    background:var(--surface2);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    flex-shrink:0;
  }

  .modal-matchup {
    display:flex; align-items:center; gap:14px;
    flex-wrap:wrap;
  }
  .modal-team {
    display:flex; align-items:center; gap:8px;
  }
  .modal-team img {
    width:32px; height:32px; object-fit:contain; flex-shrink:0;
  }
  .modal-team-abb {
    font-family:'Bebas Neue',sans-serif;
    font-size:22px; letter-spacing:.06em; color:#fff;
  }
  .modal-score {
    font-family:'Bebas Neue',sans-serif;
    font-size:28px; letter-spacing:.04em; color:#fff;
    min-width:20px; text-align:center;
  }
  .modal-score.w { color:var(--win); }
  .modal-sep {
    font-family:'Bebas Neue',sans-serif;
    font-size:20px; color:var(--muted2); padding:0 4px;
  }

  .modal-meta-col {
    display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0;
  }
  .modal-badge {
    font-size:10px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; padding:3px 8px; border-radius:5px;
  }
  .modal-badge.final   { background:var(--green-dim); color:var(--green); }
  .modal-badge.forfeit { background:var(--amber-dim); color:var(--amber); }
  .modal-badge.ot      { background:var(--blue-dim);  color:var(--blue); }
  .modal-season {
    font-size:11px; color:var(--muted); letter-spacing:.03em;
  }

  .modal-close {
    background:none; border:none; cursor:pointer;
    color:var(--muted); font-size:22px; line-height:1;
    padding:4px 6px; border-radius:6px;
    transition:color .14s, background .14s;
    flex-shrink:0;
  }
  .modal-close:hover { color:#fff; background:rgba(255,255,255,.07); }

  .modal-body {
    overflow-y:auto; flex:1;
    padding:20px;
    display:flex; flex-direction:column; gap:20px;
  }

  /* POTG + Refs bar */
  .modal-info-bar {
    display:grid; grid-template-columns:1fr 1fr; gap:14px;
  }
  @media (max-width:520px) { .modal-info-bar { grid-template-columns:1fr; } }

  .info-card {
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px; padding:14px 16px;
  }
  .info-card-label {
    font-size:9px; font-weight:700; letter-spacing:.14em;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:10px;
  }
  .potg-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:19px; letter-spacing:.04em; color:#fff; margin-bottom:4px;
  }
  .potg-team {
    font-size:11px; color:var(--muted); margin-bottom:10px;
  }
  .potg-stats {
    display:flex; flex-wrap:wrap; gap:6px 10px;
  }
  .potg-stat {
    display:flex; flex-direction:column; align-items:center;
    background:var(--surface3); border-radius:6px; padding:6px 10px;
    min-width:36px;
  }
  .potg-stat-val {
    font-size:16px; font-weight:700; color:#fff; line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .potg-stat-lbl { font-size:9px; color:var(--muted); letter-spacing:.06em; margin-top:3px; }

  .refs-list { font-size:13px; color:var(--text); line-height:1.7; }
  .refs-empty { font-size:13px; color:var(--muted); font-style:italic; }

  /* Box score section */
  .boxscore-section {}
  .bs-team-header {
    display:flex; align-items:center; gap:8px; margin-bottom:8px;
  }
  .bs-team-header img { width:22px; height:22px; object-fit:contain; }
  .bs-team-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:16px; letter-spacing:.06em; color:#fff;
  }
  .bs-score-chip {
    margin-left:auto;
    font-size:13px; font-weight:700; color:var(--muted);
    font-variant-numeric:tabular-nums;
  }
  .bs-score-chip.w { color:var(--win); }

  .bs-table {
    width:100%; border-collapse:collapse;
    background:var(--surface2); border-radius:8px; overflow:hidden;
    border:1px solid var(--border);
  }
  .bs-table thead tr {
    background:var(--surface3);
  }
  .bs-table th {
    font-size:9px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted);
    padding:7px 10px; text-align:right; white-space:nowrap;
  }
  .bs-table th:first-child { text-align:left; min-width:100px; }
  .bs-table td {
    font-size:12px; color:var(--text);
    padding:7px 10px; text-align:right;
    border-top:1px solid var(--border2);
    font-variant-numeric:tabular-nums;
  }
  .bs-table td:first-child { text-align:left; color:#fff; font-weight:500; }
  .bs-table tbody tr:hover { background:rgba(255,255,255,.02); }
  .bs-table td.pts { font-weight:700; color:var(--win); }
  .bs-no-stats { font-size:13px; color:var(--muted); font-style:italic; padding:8px 0; }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <span class="nav-pill">Season 11</span>
  </div>
  <div class="nav-right">
    <span class="sync-label" id="last-sync"></span>
    <div class="live-pill" id="live-pill">
      <div class="live-dot"></div>
      <span id="live-label">Offline</span>
    </div>
  </div>
</nav>

<div class="page">

  <div class="hero">
    <div>
      <div class="hero-title"><em>RPL</em> League Standings</div>
      <div class="hero-sub">Live · Updates after every game · Season 11</div>
    </div>
    <div class="playoff-key">
      <div class="key-item"><div class="key-pip z"></div>z – Leader</div>
      <div class="key-item"><div class="key-pip x"></div>x – Playoff</div>
      <div class="key-item"><div class="key-pip pi"></div>pi – Play-In</div>
      <div class="key-item"><div class="key-pip e"></div>e – Eliminated</div>
    </div>
  </div>

  <div class="alert" id="alert"></div>

  <div id="results-strip">
    <div class="strip-box">
      <div class="strip-head">
        <div class="strip-dot"></div>
        <span class="strip-head-label">Recent Results</span>
      </div>
      <div class="strip-scroll" id="results-list"></div>
    </div>
  </div>

  <div class="conferences" id="conferences"></div>

</div>

<div id="toasts"></div>

<!-- BOX SCORE MODAL -->
<div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-label="Box Score">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-matchup" id="modal-matchup"></div>
      <div class="modal-meta-col">
        <span class="modal-badge" id="modal-badge"></span>
        <span class="modal-season" id="modal-season"></span>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const CFG = { API:'https://rplstandings.onrender.com/rpl/standings', POLL:30000 };

const ESPN_LOGOS = {
  ATL:'atl',BOS:'bos',BKN:'bkn',CHA:'cha',CHI:'chi',CLE:'cle',
  DAL:'dal',DEN:'den',DET:'det',GSW:'gs',HOU:'hou',IND:'ind',
  LAC:'lac',LAL:'lal',MEM:'mem',MIA:'mia',MIL:'mil',MIN:'min',
  NOP:'no',NYK:'ny',OKC:'okc',ORL:'orl',PHI:'phi',PHX:'phx',
  POR:'por',SAC:'sac',SAS:'sa',TOR:'tor',UTAH:'utah',WAS:'wsh',
};
const logo = (url, abb) => {
  if (ESPN_LOGOS[abb]) return `https://a.espncdn.com/i/teamlogos/nba/500/${ESPN_LOGOS[abb]}.png`;
  if (!url) return '';
  if (url.includes('roblox.com')) return '';
  return url.startsWith('http://') ? 'https://'+url.slice(7) : url;
};

const NAMES = {
  ATL:'Atlanta Hawks',BOS:'Boston Celtics',BKN:'Brooklyn Nets',CHA:'Charlotte Hornets',
  CHI:'Chicago Bulls',CLE:'Cleveland Cavaliers',DAL:'Dallas Mavericks',DEN:'Denver Nuggets',
  DET:'Detroit Pistons',GSW:'Golden State Warriors',HOU:'Houston Rockets',IND:'Indiana Pacers',
  LAC:'LA Clippers',LAL:'Los Angeles Lakers',MEM:'Memphis Grizzlies',MIA:'Miami Heat',
  MIL:'Milwaukee Bucks',MIN:'Minnesota Timberwolves',NOP:'New Orleans Pelicans',NYK:'New York Knicks',
  OKC:'Oklahoma City Thunder',ORL:'Orlando Magic',PHI:'Philadelphia 76ers',PHX:'Phoenix Suns',
  POR:'Portland Trail Blazers',SAC:'Sacramento Kings',SAS:'San Antonio Spurs',TOR:'Toronto Raptors',
  UTAH:'Utah Jazz',WAS:'Washington Wizards',
};
const EAST = new Set(['ATL','BOS','BKN','CHA','CHI','CLE','DET','IND','MIA','MIL','NYK','ORL','PHI','TOR','WAS']);
const WEST = new Set(['DAL','DEN','GSW','HOU','LAC','LAL','MEM','MIN','NOP','OKC','PHX','POR','SAC','SAS','UTAH']);

let prevData = null, fails = 0, lastResultId = null;

const pct = (w,l) => { const g=w+l; return g?( w/g).toFixed(3).replace(/^0/,''):'—'; };

const timeAgo = iso => {
  if(!iso) return '';
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60) return `${s}s ago`;
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
};

function toast(msg, c='red', dur=5000) {
  const t = Object.assign(document.createElement('div'),{className:`toast ${c}`,textContent:msg});
  document.getElementById('toasts').prepend(t);
  setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),240); }, dur);
}

function setLive(v) {
  const p=document.getElementById('live-pill'), l=document.getElementById('live-label');
  p.classList.toggle('live',v); l.textContent=v?'Live':'Offline';
}
function setSync(iso) {
  document.getElementById('last-sync').textContent = iso ? `Synced ${timeAgo(iso)}` : '';
}

/* Results strip */
const gameDataStore = new Map();

function renderResults(games) {
  const strip=document.getElementById('results-strip'), list=document.getElementById('results-list');
  if(!games?.length){ strip.style.display='none'; return; }
  strip.style.display='block';

  const clickable = st => st==='final'||st==='forfeit';

  list.innerHTML = games.slice(0,8).map((g,i)=>{
    const hw = g.homeScore > g.awayScore;
    const st = (g.status||'final').toLowerCase();
    let badge=st.toUpperCase(), bcls=st;
    if(st==='final'&&g.quarter==='OT'){badge='FINAL/OT';bcls='ot';}
    if(st==='incomplete'){badge='NO RESULT';}
    const aLogo=logo(g.awayLogo,g.awayABB), hLogo=logo(g.homeLogo,g.homeABB);
    const idx = `game-${i}-${g.id||i}`;
    gameDataStore.set(idx, g);
    const isClick = clickable(st);
    return `<div class="result-card ${st}${isClick?' clickable':''}" ${isClick?`data-game="${idx}" role="button" tabindex="0" aria-label="View box score"`:''}>
      <div class="rc-teams">
        <div class="rc-row">
          ${aLogo?`<img class="rc-logo" src="${aLogo}" alt="" loading="lazy">`:''}
          <span class="rc-abbr">${g.awayABB||'???'}</span>
          <span class="rc-score ${!hw?'w':''}">${g.awayScore??'—'}</span>
        </div>
        <div class="rc-row">
          ${hLogo?`<img class="rc-logo" src="${hLogo}" alt="" loading="lazy">`:''}
          <span class="rc-abbr">${g.homeABB||'???'}</span>
          <span class="rc-score ${hw?'w':''}">${g.homeScore??'—'}</span>
        </div>
      </div>
      <div class="rc-meta">
        <span class="rc-badge ${bcls}">${badge}</span>
        ${g.note?`<span class="rc-note">${g.note}</span>`:''}
      </div>
      ${isClick?'<div class="rc-click-hint">Box score ↗</div>':''}
    </div>`;
  }).join('');

  // Attach click listeners
  list.querySelectorAll('.result-card.clickable').forEach(card=>{
    card.addEventListener('click', ()=>openBoxScore(gameDataStore.get(card.dataset.game)));
    card.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') openBoxScore(gameDataStore.get(card.dataset.game)); });
  });
}

/* ── BOX SCORE MODAL ── */
function openBoxScore(g) {
  if(!g) return;
  const hw = g.homeScore > g.awayScore;
  const aw = g.awayScore > g.homeScore;
  const st = (g.status||'final').toLowerCase();
  const aLogo=logo(g.awayLogo,g.awayABB), hLogo=logo(g.homeLogo,g.homeABB);

  // Header matchup
  const mq = document.getElementById('modal-matchup');
  mq.innerHTML = `
    <div class="modal-team">
      ${aLogo?`<img src="${aLogo}" alt="${g.awayABB}">`:''}
      <span class="modal-team-abb">${g.awayABB||'???'}</span>
    </div>
    <span class="modal-score${aw?' w':''}">${g.awayScore??'—'}</span>
    <span class="modal-sep">–</span>
    <span class="modal-score${hw?' w':''}">${g.homeScore??'—'}</span>
    <div class="modal-team">
      <span class="modal-team-abb">${g.homeABB||'???'}</span>
      ${hLogo?`<img src="${hLogo}" alt="${g.homeABB}">`:''}
    </div>`;

  // Badge
  const mb = document.getElementById('modal-badge');
  let badgeText = st.toUpperCase(), badgeCls = st;
  if(st==='final'&&g.quarter==='OT'){badgeText='FINAL/OT';badgeCls='ot';}
  if(st==='forfeit'){badgeText='FORFEIT';}
  mb.textContent = badgeText;
  mb.className = `modal-badge ${badgeCls}`;

  document.getElementById('modal-season').textContent = g.season||'';

  // Body
  const body = document.getElementById('modal-body');

  // POTG
  const potg = g.playerOfGame;
  const potgHtml = potg ? `
    <div class="info-card">
      <div class="info-card-label">⭐ Player of the Game</div>
      <div class="potg-name">${potg.name||'—'}</div>
      <div class="potg-team">${potg.team||''}</div>
      <div class="potg-stats">
        ${[['PTS',potg.pts],['AST',potg.ast],['REB',potg.reb],['STL',potg.stl],['BLK',potg.blk]].map(([l,v])=>`
          <div class="potg-stat">
            <span class="potg-stat-val">${v??0}</span>
            <span class="potg-stat-lbl">${l}</span>
          </div>`).join('')}
      </div>
    </div>` :
    `<div class="info-card">
      <div class="info-card-label">⭐ Player of the Game</div>
      <p class="refs-empty">Not available</p>
    </div>`;

  // Refs — use dedicated referees field sent from Roblox
  const refText = (g.referees && g.referees !== '') ? g.referees : null;
  const refsHtml = `
    <div class="info-card">
      <div class="info-card-label">📋 Referee(s)</div>
      ${refText
        ? `<div class="refs-list">${refText}</div>`
        : `<p class="refs-empty">Not listed</p>`}
    </div>`;

  // Box score table builder
  const buildTable = (stats, teamABB, teamScore, isWinner, tLogo) => {
    if(!stats?.length) return `<p class="bs-no-stats">No player stats recorded</p>`;
    return `<table class="bs-table">
      <thead><tr>
        <th>Player</th>
        <th>PTS</th><th>AST</th><th>REB</th>
        <th>STL</th><th>BLK</th>
        <th>FGM</th><th>FGA</th><th>FG%</th>
        <th>FTM</th><th>FTA</th>
        <th>3PM</th><th>3PA</th>
        <th>TO</th>
      </tr></thead>
      <tbody>
        ${stats.map(p=>{
          const fgPct = p.fga>0 ? Math.round(p.fgm/p.fga*100) : 0;
          return `<tr>
            <td>${p.name||'?'}</td>
            <td class="pts">${p.pts??0}</td>
            <td>${p.ast??0}</td>
            <td>${p.reb??0}</td>
            <td>${p.stl??0}</td>
            <td>${p.blk??0}</td>
            <td>${p.fgm??0}</td>
            <td>${p.fga??0}</td>
            <td>${fgPct}%</td>
            <td>${p.ftm??0}</td>
            <td>${p.fta??0}</td>
            <td>${p.threeM??0}</td>
            <td>${p.threeA??0}</td>
            <td>${p.to??0}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  };

  body.innerHTML = `
    <div class="modal-info-bar">
      ${potgHtml}
      ${refsHtml}
    </div>
    <div class="boxscore-section">
      <div class="bs-team-header">
        ${aLogo?`<img src="${aLogo}" alt="">`:''}
        <span class="bs-team-name">${g.awayABB||'Away'}</span>
        <span class="bs-score-chip${aw?' w':''}">${g.awayScore??'—'}</span>
      </div>
      ${buildTable(g.awayStats, g.awayABB, g.awayScore, aw, aLogo)}
    </div>
    <div class="boxscore-section">
      <div class="bs-team-header">
        ${hLogo?`<img src="${hLogo}" alt="">`:''}
        <span class="bs-team-name">${g.homeABB||'Home'}</span>
        <span class="bs-score-chip${hw?' w':''}">${g.homeScore??'—'}</span>
      </div>
      ${buildTable(g.homeStats, g.homeABB, g.homeScore, hw, hLogo)}
    </div>`;

  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-backdrop')) closeModal();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* Standings */
function flatToConfs(teams) {
  const e=[], w=[], o=[];
  for(const t of teams){
    const entry={
      name:NAMES[t.abb]||t.abb, abbr:t.abb,
      w:t.wins||0, l:t.losses||0, pct:t.pct||'0.000',
      status:t.status||'', logo:logo(t.logo,t.abb), streak:t.streak||'—',
    };
    if(EAST.has(t.abb)) e.push(entry);
    else if(WEST.has(t.abb)) w.push(entry);
    else o.push(entry);
  }
  return { eastern:e, western:[...w,...o] };
}

function sortTeams(arr){ return [...arr].sort((a,b)=>{ const pa=parseFloat(a.pct)||0,pb=parseFloat(b.pct)||0; if(pb!==pa) return pb-pa; const ga=a.w+a.l,gb=b.w+b.l; if(gb!==ga) return gb-ga; return b.w-a.w; }); }

function strk(raw){
  if(!raw||raw==='—') return `<span class="r-strk n">—</span>`;
  return `<span class="r-strk ${raw[0]==='W'?'w':'l'}">${raw}</span>`;
}

function renderConfs(data) {
  const el = document.getElementById('conferences');
  const sd = Array.isArray(data.standings)
    ? flatToConfs(data.standings)
    : (data.standings||{eastern:[],western:[]});

  const changed = new Set();
  if(prevData){
    for(const ck of ['eastern','western']){
      for(const t of (sd[ck]||[])){
        const p=(prevData[ck]||[]).find(x=>x.abbr===t.abbr);
        if(!p||p.w!==t.w||p.l!==t.l||p.status!==t.status||p.streak!==t.streak) changed.add(t.abbr);
      }
    }
  }

  const CONFS = [
    {key:'eastern',name:'Eastern Conference',cls:'east',tag:'EAST'},
    {key:'western',name:'Western Conference',cls:'west',tag:'WEST'},
  ];

  el.innerHTML = CONFS.map(c=>{
    const teams = sortTeams(sd[c.key]||[]);
    const rows = teams.map((t,i)=>{
      const sc = t.status||'e', fl = changed.has(t.abbr)?' flash':'';
      const lg = t.logo||'';
      return `<div class="tbl-row s-${sc}${fl}" data-abbr="${t.abbr}">
        <span class="r-rank">${i+1}</span>
        <span class="r-logo">${lg?`<img src="${lg}" alt="" loading="lazy">`:`<div class="placeholder"></div>`}</span>
        <span class="r-team">
          <div class="r-name">${t.name}</div>
          <div class="r-meta">
            <span class="r-abbr">${t.abbr}</span>
            ${t.status?`<span class="r-badge ${sc}">${sc.toUpperCase()}</span>`:''}
          </div>
        </span>
        <span class="r-w">${t.w}</span>
        <span class="r-l">${t.l}</span>
        <span class="r-pct">${pct(t.w,t.l)}</span>
        ${strk(t.streak)}
      </div>`;
    }).join('');

    return `<div>
      <div class="conf-label">
        <span class="conf-tag ${c.cls}">${c.tag}</span>
        <span class="conf-name">${c.name}</span>
      </div>
      <div class="tbl">
        <div class="tbl-head">
          <span>#</span><span></span><span>Team</span>
          <span>W</span><span>L</span><span>PCT</span><span>STRK</span>
        </div>
        ${rows}
      </div>
    </div>`;
  }).join('');

  setTimeout(()=>{
    document.querySelectorAll('.tbl-row.flash').forEach(r=>r.classList.remove('flash'));
  }, 1800);

  prevData = JSON.parse(JSON.stringify(sd));
}

async function fetchStandings(){
  try {
    const res = await fetch(CFG.API,{cache:'no-store',headers:{Accept:'application/json'}});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    fails = 0; setLive(true);
    setSync(data.lastUpdated||new Date().toISOString());
    document.getElementById('alert').classList.remove('show');

    if(data.results?.length){
      const latest = data.results[0];
      if(latest?.id && latest.id!==lastResultId && prevData){
        lastResultId = latest.id;
        const st=latest.status;
        toast(
          `${latest.awayABB} @ ${latest.homeABB} — ${
            st==='final'?`${latest.awayScore}–${latest.homeScore} FINAL`:
            st==='forfeit'?'FORFEIT':
            st==='incomplete'?'NO RESULT':st.toUpperCase()}`,
          st==='forfeit'?'amber':'green', 6000
        );
      }
      if(!lastResultId) lastResultId=data.results[0]?.id;
    }

    renderResults(data.results||[]);
    renderConfs(data);

  } catch(err){
    fails++;
    if(fails>=3){
      setLive(false);
      const a=document.getElementById('alert');
      a.textContent=`⚠ Standings server unreachable — showing last known data. (${err.message})`;
      a.classList.add('show');
    }
    if(!prevData) renderConfs({standings:[]});
  }
}

function connectSSE(){
  if(typeof EventSource==='undefined') return;
  const url=CFG.API.replace(/\/standings$/,'/standings/events');
  const es=new EventSource(url);
  es.addEventListener('standings',()=>fetchStandings());
  es.addEventListener('result',()=>fetchStandings());
  es.onerror=()=>es.close();
}

(async()=>{
  await fetchStandings();
  setInterval(fetchStandings,CFG.POLL);
  connectSSE();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RPL Standings</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8001d;
    --bg: #060608;
    --surface: #0d0d10;
    --surface2: #111115;
    --border: rgba(255,255,255,.06);
    --muted: #555;
    --text: #e8e8ee;
    --green: #22c55e;
    --amber: #f59e0b;
    --blue: #3b82f6;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 52px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,6,8,.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo span { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: .06em; color: #fff; }
  .nav-logo span em { color: var(--red); font-style: normal; }

  .nav-right { display: flex; align-items: center; gap: 10px; }

  .live-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; letter-spacing: .1em;
    color: var(--muted); text-transform: uppercase;
    transition: color .3s;
  }
  .live-pill.live { color: var(--green); }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background .3s;
  }
  .live-pill.live .live-dot {
    background: var(--green);
    animation: pulse 1.8s ease infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.4; transform:scale(.7); }
  }

  .last-sync { font-size: 10px; color: var(--muted); }

  /* ── PLAYOFF KEY ── */
  .playoff-key {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; flex-wrap: wrap; gap: 10px 16px;
  }
  .key-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
  .key-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .key-dot.z  { background: var(--amber); }
  .key-dot.x  { background: var(--green); }
  .key-dot.pi { background: var(--blue); }
  .key-dot.e  { background: #555; }
  .key-eligibility {
    width: 100%;
    font-size: 10px; color: #333;
    padding-top: 4px;
    border-top: 1px solid var(--border);
  }

  /* ── STATE BANNER ── */
  .state-banner {
    display: none;
    margin: 0 16px 8px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--surface);
  }
  .state-banner.show { display: block; }

  /* ── RESULTS STRIP ── */
  #results-strip {
    display: none;
    border-bottom: 1px solid var(--border);
  }
  .results-strip-inner {
    background: var(--surface2);
    overflow: hidden;
  }
  .results-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .results-header-title {
    font-size: 10px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
  }
  .results-header-title em { color: var(--red); font-style: normal; }

  /* Horizontal scroll on mobile */
  .results-list {
    display: flex;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .results-list::-webkit-scrollbar { display: none; }

  .result-card {
    display: flex; align-items: center;
    padding: 12px 18px;
    border-right: 1px solid var(--border);
    min-width: 200px;
    flex-shrink: 0;
    position: relative;
    transition: background .15s;
  }
  .result-card:last-child { border-right: none; }
  .result-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .result-card.final::before    { background: var(--green); }
  .result-card.forfeit::before  { background: var(--amber); }
  .result-card.incomplete::before { background: #555; }

  .result-teams { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .result-row { display: flex; align-items: center; gap: 8px; }
  .result-abbr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: .06em; color: #fff;
    width: 36px;
  }
  .result-score { font-size: 13px; font-weight: 700; color: #fff; width: 24px; text-align: right; }
  .result-score.winner { color: var(--green); }
  .result-score.loser  { color: var(--muted); }

  .result-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; margin-left: 12px; }
  .result-status-badge {
    font-size: 9px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; padding: 3px 6px; border-radius: 4px;
    white-space: nowrap;
  }
  .result-status-badge.final    { background: rgba(34,197,94,.12); color: var(--green); }
  .result-status-badge.forfeit  { background: rgba(245,158,11,.12); color: var(--amber); }
  .result-status-badge.incomplete { background: rgba(85,85,85,.2); color: var(--muted); }
  .result-status-badge.ot       { background: rgba(59,130,246,.12); color: var(--blue); }
  .result-quarter { font-size: 10px; color: var(--muted); }

  /* ── CONFERENCE TABS (mobile) ── */
  .conf-tabs {
    display: none;
    position: sticky;
    top: 52px;
    z-index: 90;
    background: rgba(6,6,8,.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .conf-tab-list {
    display: flex;
  }
  .conf-tab {
    flex: 1;
    padding: 12px 16px;
    font-size: 12px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .conf-tab.active { color: #fff; border-bottom-color: var(--red); }
  .conf-tab.east.active { border-bottom-color: var(--red); }
  .conf-tab.west.active { border-bottom-color: #60a5fa; }

  /* ── CONFERENCES LAYOUT ── */
  .conferences {
    padding: 0 0 80px;
  }

  .conference {
    display: none; /* hidden by default on mobile, shown via JS */
  }
  .conference.active { display: block; }

  .conf-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .conf-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: .12em;
    padding: 3px 8px; border-radius: 4px; color: #fff;
  }
  .conf-badge.east { background: rgba(232,0,29,.2); color: var(--red); border: 1px solid rgba(232,0,29,.3); }
  .conf-badge.west { background: rgba(59,130,246,.15); color: #60a5fa; border: 1px solid rgba(59,130,246,.25); }
  .conf-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .04em; color: #fff; }

  /* ── STANDINGS TABLE ── */
  .standings-table {
    width: 100%;
    background: var(--surface);
    overflow: hidden;
  }
  .standings-table-header {
    display: grid;
    grid-template-columns: 26px 32px 1fr 40px 40px 60px 40px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    position: sticky;
    top: 52px; /* below nav */
    z-index: 80;
  }
  .standings-table-header span {
    font-size: 9px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted); text-align: center;
  }
  .standings-table-header span:nth-child(3) { text-align: left; }

  .standing-row {
    display: grid;
    grid-template-columns: 26px 32px 1fr 40px 40px 60px 40px;
    padding: 10px 12px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,.03);
    transition: background .15s;
    position: relative;
    /* Better tap targets */
    min-height: 48px;
  }
  .standing-row:last-child { border-bottom: none; }
  .standing-row:active { background: rgba(255,255,255,.04); }
  .standing-row::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
  }
  .standing-row.status-z::before  { background: var(--amber); }
  .standing-row.status-x::before  { background: var(--green); }
  .standing-row.status-pi::before { background: var(--blue); }
  .standing-row.status-e::before  { background: transparent; }

  @keyframes rowFlash {
    0%   { background: rgba(232,0,29,.18); }
    100% { background: transparent; }
  }
  .standing-row.updated { animation: rowFlash 1.4s ease forwards; }

  .row-rank { font-size:12px; font-weight:600; color:var(--muted); text-align:center; }
  .row-logo img { width:22px; height:22px; object-fit:contain; display:block; margin:auto; }
  .row-team-name { font-size:12px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row-team-abbr { font-size:9px; color:var(--muted); letter-spacing:.06em; display:flex; align-items:center; gap:4px; }
  .row-w  { text-align:center; font-size:12px; color:var(--green); font-weight:600; }
  .row-l  { text-align:center; font-size:12px; color:#ef4444; font-weight:600; }
  .row-pct { text-align:center; font-size:12px; color:#fff; font-weight:600; }
  .row-gb  { text-align:center; font-size:12px; color:var(--muted); }

  .status-badge {
    display: inline-flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700; letter-spacing:.06em;
    width:18px; height:18px; border-radius:3px; flex-shrink:0;
  }
  .status-badge.z  { background:rgba(245,158,11,.15); color:var(--amber); }
  .status-badge.x  { background:rgba(34,197,94,.12); color:var(--green); }
  .status-badge.pi { background:rgba(59,130,246,.15); color:#60a5fa; }
  .status-badge.e  { display:none; }

  .standing-row.status-e .row-team-name,
  .standing-row.status-e .row-w,
  .standing-row.status-e .row-l,
  .standing-row.status-e .row-pct { color: #666; }

  /* ── TOAST ── */
  #toast-container {
    position: fixed; bottom: 20px; left: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 9999; pointer-events: none;
  }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px; color: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    animation: toastIn .25s ease forwards;
    pointer-events: all;
    text-align: center;
  }
  .toast.green { border-left-color: var(--green); }
  .toast.amber { border-left-color: var(--amber); }
  @keyframes toastIn {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes toastOut {
    from { opacity:1; }
    to   { opacity:0; transform:translateY(-8px); }
  }
  .toast.dying { animation: toastOut .25s ease forwards; }

  /* ── DESKTOP OVERRIDES ── */
  @media (min-width: 768px) {
    nav { padding: 0 40px; height: 58px; }

    .last-sync { font-size: 11px; }

    .playoff-key {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 32px 40px 0;
      padding: 16px 20px;
      gap: 16px;
    }
    .key-eligibility {
      width: auto;
      border-top: none;
      padding-top: 0;
      margin-left: auto;
      font-size: 11px;
      color: #444;
    }

    .state-banner { margin: 12px 40px; font-size: 13px; padding: 14px 20px; }

    #results-strip {
      margin: 20px 40px 0;
      border: none;
    }
    .results-strip-inner {
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .results-header { padding: 12px 20px; }
    .result-card { min-width: 260px; padding: 14px 24px; }
    .result-abbr { font-size: 15px; width: 40px; }
    .result-score { font-size: 14px; width: 28px; }
    .result-meta { margin-left: 16px; }

    .conf-tabs { display: none !important; }

    .conferences {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 24px 40px 80px;
    }

    .conference { display: block !important; }

    .conf-header { padding: 28px 0 20px; background: transparent; border-bottom: none; }
    .conf-title { font-size: 26px; }

    .standings-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .standings-table-header {
      grid-template-columns: 28px 36px 1fr 48px 48px 70px 48px;
      padding: 10px 16px;
      position: static; /* not sticky on desktop */
      top: auto;
    }
    .standings-table-header span { font-size: 10px; }

    .standing-row {
      grid-template-columns: 28px 36px 1fr 48px 48px 70px 48px;
      padding: 11px 16px;
      min-height: auto;
    }
    .standing-row:hover { background: rgba(255,255,255,.03); }
    .standing-row:active { background: none; }

    .row-rank { font-size: 13px; }
    .row-logo img { width: 24px; height: 24px; }
    .row-team-name { font-size: 13px; }
    .row-team-abbr { font-size: 10px; }
    .row-w, .row-l, .row-pct, .row-gb { font-size: 13px; }

    .status-badge { width: 20px; height: 20px; font-size: 10px; }

    #toast-container {
      left: auto;
      right: 28px;
      bottom: 28px;
      width: 320px;
    }
    .toast { text-align: left; }
  }
</style>
</head>

      "Miami Heat","Milwaukee Bucks","New York Knicks","Orlando Magic",
      "Philadelphia 76ers","Toronto Raptors","Washington Wizards"
    ].map(n => ({ name:n, abbr:n.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase(), w:0, l:0, status:'' })),
    western: [
      "Dallas Mavericks","Denver Nuggets","Golden State Warriors","Houston Rockets",
      "LA Clippers","Los Angeles Lakers","Memphis Grizzlies","Minnesota Timberwolves",
      "New Orleans Pelicans","Oklahoma City Thunder","Phoenix Suns",
      "Portland Trail Blazers","Sacramento Kings","San Antonio Spurs","Utah Jazz"
    ].map(n => ({ name:n, abbr:n.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase(), w:0, l:0, status:'' })),
  },
  results: [],
};

let prevStandings = null;
let consecutiveFails = 0;
let activeConfIndex = 0;

function isMobile() {
  return window.innerWidth < 768;
}

function pct(w, l) {
  const gp = w + l;
  return gp === 0 ? null : w / gp;
}

function fmtPct(w, l) {
  const p = pct(w, l);
  return p === null ? '—' : p.toFixed(3).replace(/^0/, '');
}

function calcGB(lw, ll, w, l) {
  const gb = ((lw - w) + (l - ll)) / 2;
  if (gb === 0) return '—';
  return gb % 1 === 0 ? gb.toFixed(0) : gb.toFixed(1);
}

function timeAgo(isoStr) {
  if (!isoStr) return 'Unknown';
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 60)    return `${diff}s ago`;
  if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function showToast(msg, colour = 'red', duration = 4000) {
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${colour}`;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => {
    t.classList.add('dying');
    setTimeout(() => t.remove(), 300);
  }, duration);
}

function setLive(isLive) {
  const pill  = document.getElementById('live-pill');
  const label = document.getElementById('live-label');
  pill.classList.toggle('live', isLive);
  label.textContent = isLive ? 'Live' : 'Offline';
}

function setLastSync(isoStr) {
  document.getElementById('last-sync').textContent =
    isoStr ? `Updated ${timeAgo(isoStr)}` : 'Never synced';
}

function renderResults(games) {
  const strip = document.getElementById('results-strip');
  const list  = document.getElementById('results-list');

  if (!games || games.length === 0) {
    strip.style.display = 'none';
    return;
  }

  strip.style.display = 'block';
  list.innerHTML = games.slice(0, 5).map(g => {
    const homeWin = g.homeScore > g.awayScore;
    const status  = (g.status || 'final').toLowerCase();

    let badgeLabel = status.toUpperCase();
    let badgeClass = status;
    if (status === 'final' && g.quarter === 'OT') {
      badgeLabel = 'FINAL/OT';
      badgeClass = 'ot';
    }
    if (status === 'forfeit')    badgeLabel = 'FORFEIT';
    if (status === 'incomplete') badgeLabel = 'NO RESULT';

    return `
      <div class="result-card ${status}">
        <div class="result-teams">
          <div class="result-row">
            <span class="result-abbr">${g.awayABB || '???'}</span>
            <span class="result-score ${!homeWin ? 'winner' : 'loser'}">${g.awayScore ?? '—'}</span>
          </div>
          <div class="result-row">
            <span class="result-abbr">${g.homeABB || '???'}</span>
            <span class="result-score ${homeWin ? 'winner' : 'loser'}">${g.homeScore ?? '—'}</span>
          </div>
        </div>
        <div class="result-meta">
          <span class="result-status-badge ${badgeClass}">${badgeLabel}</span>
          ${g.note ? `<span class="result-quarter">${g.note}</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

const ABB_TO_NAME = {
  ATL:"Atlanta Hawks",BOS:"Boston Celtics",BKN:"Brooklyn Nets",CHA:"Charlotte Hornets",
  CHI:"Chicago Bulls",CLE:"Cleveland Cavaliers",DAL:"Dallas Mavericks",DEN:"Denver Nuggets",
  DET:"Detroit Pistons",GSW:"Golden State Warriors",HOU:"Houston Rockets",IND:"Indiana Pacers",
  LAC:"LA Clippers",LAL:"Los Angeles Lakers",MEM:"Memphis Grizzlies",MIA:"Miami Heat",
  MIL:"Milwaukee Bucks",MIN:"Minnesota Timberwolves",NOP:"New Orleans Pelicans",NYK:"New York Knicks",
  OKC:"Oklahoma City Thunder",ORL:"Orlando Magic",PHI:"Philadelphia 76ers",PHX:"Phoenix Suns",
  POR:"Portland Trail Blazers",SAC:"Sacramento Kings",SAS:"San Antonio Spurs",TOR:"Toronto Raptors",
  UTAH:"Utah Jazz",WAS:"Washington Wizards"
};

function buildStandingsFromFlat(flatTeams) {
  const eastern = ["ATL","BOS","BKN","CHA","CHI","CLE","DET","IND","MIA","MIL","NYK","ORL","PHI","TOR","WAS"];
  const western = ["DAL","DEN","GSW","HOU","LAC","LAL","MEM","MIN","NOP","OKC","PHX","POR","SAC","SAS","UTAH"];

  const eastTeams = [];
  const westTeams = [];

  for (const team of flatTeams) {
    const name = ABB_TO_NAME[team.abb] || team.abb;
    const entry = {
      name, abbr: team.abb,
      w: team.wins || 0, l: team.losses || 0,
      status: team.status || '',
      logo: team.logo || LOGOS_BY_ABB[team.abb] || LOGOS[name] || '',
      streak: team.streak || '—',
      pct: team.pct || '0.000',
    };
    if (eastern.includes(team.abb)) eastTeams.push(entry);
    else westTeams.push(entry);
  }

  return { eastern: eastTeams, western: westTeams };
}

function setActiveConf(index) {
  activeConfIndex = index;
  document.querySelectorAll('.conf-tab').forEach((tab, i) => {
    tab.classList.toggle('active', i === index);
  });
  document.querySelectorAll('.conference').forEach((conf, i) => {
    conf.classList.toggle('active', i === index);
  });
}

function initTabs() {
  const tabs = document.getElementById('conf-tabs');
  tabs.style.display = 'block';

  document.querySelectorAll('.conf-tab').forEach((tab, i) => {
    tab.addEventListener('click', () => setActiveConf(i));
  });

  // Update visibility on resize
  window.addEventListener('resize', () => {
    if (!isMobile()) {
      document.querySelectorAll('.conference').forEach(c => c.classList.add('active'));
    } else {
      document.querySelectorAll('.conference').forEach((c, i) => {
        c.classList.toggle('active', i === activeConfIndex);
      });
    }
  });
}

function renderConferences(data) {
  const container = document.getElementById('conferences');

  let standingsData = data.standings;
  if (Array.isArray(data.standings)) standingsData = buildStandingsFromFlat(data.standings);
  if (!standingsData || (!standingsData.eastern && !standingsData.western)) standingsData = FALLBACK.standings;

  const confDefs = [
    { key: 'eastern', name: 'Eastern Conference', cls: 'east', badge: 'EAST' },
    { key: 'western', name: 'Western Conference', cls: 'west', badge: 'WEST' },
  ];

  const changedAbbrs = new Set();
  if (prevStandings) {
    for (const ck of ['eastern', 'western']) {
      const prev = prevStandings[ck] || [];
      const next = standingsData[ck]  || [];
      for (const team of next) {
        const p = prev.find(t => t.abbr === team.abbr);
        if (!p || p.w !== team.w || p.l !== team.l || p.status !== team.status) changedAbbrs.add(team.abbr);
      }
    }
  }

  container.innerHTML = confDefs.map((conf, confIndex) => {
    const teams  = [...(standingsData[conf.key] || [])];
    const sorted = teams.sort((a,b) => {
      const pa = pct(a.w, a.l) ?? -1;
      const pb = pct(b.w, b.l) ?? -1;
      if (pb !== pa) return pb - pa;
      return b.w - a.w;
    });
    const leader = sorted[0];

    const rows = sorted.map((team, i) => {
      const gb       = i === 0 ? '—' : calcGB(leader.w, leader.l, team.w, team.l);
      const stsCls   = team.status ? `status-${team.status}` : '';
      const badgeCls = team.status || 'e';
      const flash    = changedAbbrs.has(team.abbr) ? ' updated' : '';
      const logo     = team.logo || LOGOS_BY_ABB[team.abbr] || LOGOS[team.name] || '';

      return `
        <div class="standing-row ${stsCls}${flash}" data-abbr="${team.abbr}">
          <span class="row-rank">${i+1}</span>
          <span class="row-logo">${logo ? `<img src="${logo}" alt="${team.abbr}" loading="lazy">` : ''}</span>
          <span class="row-team">
            <div class="row-team-name">${team.name || team.abbr}</div>
            <div class="row-team-abbr">${team.abbr}
              <span class="status-badge ${badgeCls}">${(team.status||'').toUpperCase()}</span>
            </div>
          </span>
          <span class="row-w">${team.w}</span>
          <span class="row-l">${team.l}</span>
          <span class="row-pct">${fmtPct(team.w, team.l)}</span>
          <span class="row-gb">${gb}</span>
        </div>`;
    }).join('');

    // On mobile, only first conf is active initially
    const isActive = !isMobile() || confIndex === activeConfIndex;

    return `
      <div class="conference${isActive ? ' active' : ''}">
        <div class="conf-header">
          <span class="conf-badge ${conf.cls}">${conf.badge}</span>
          <span class="conf-title">${conf.name}</span>
        </div>
        <div class="standings-table">
          <div class="standings-table-header">
            <span>#</span><span></span><span>Team</span>
            <span>W</span><span>L</span><span>PCT</span><span>GB</span>
          </div>
          ${rows}
        </div>
      </div>`;
  }).join('');

  // Re-bind tab clicks after re-render
  if (isMobile()) {
    document.querySelectorAll('.conference').forEach((c, i) => {
      c.classList.toggle('active', i === activeConfIndex);
    });
  }

  setTimeout(() => {
    document.querySelectorAll('.standing-row.updated').forEach(el => el.classList.remove('updated'));
  }, 1500);

  prevStandings = JSON.parse(JSON.stringify(standingsData));
}

async function fetchStandings() {
  try {
    const res = await fetch(CONFIG.API_URL, {
      cache: 'no-store',
      headers: { 'Accept': 'application/json' },
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    consecutiveFails = 0;
    setLive(true);
    setLastSync(data.lastUpdated || new Date().toISOString());
    document.getElementById('state-banner').classList.remove('show');

    if (prevStandings && data.results?.length) {
      const latest = data.results[0];
      if (latest && latest.homeABB && latest.status) {
        showToast(
          `${latest.awayABB} @ ${latest.homeABB} — ${
            latest.status === 'final'      ? `${latest.awayScore}–${latest.homeScore} FINAL` :
            latest.status === 'forfeit'    ? 'FORFEIT' :
            latest.status === 'incomplete' ? 'NO RESULT' : latest.status.toUpperCase()
          }`,
          latest.status === 'forfeit' ? 'amber' : 'green',
          6000
        );
      }
    }

    renderResults(data.results || []);
    renderConferences(data);

  } catch (err) {
    consecutiveFails++;
    console.warn('[RPL] Fetch failed:', err.message);

    if (consecutiveFails >= 3) {
      setLive(false);
      const banner = document.getElementById('state-banner');
      banner.textContent = `⚠ Standings server unreachable. Showing last known data. (${err.message})`;
      banner.classList.add('show');
    }

    if (!prevStandings) renderConferences(FALLBACK);
  }
}

(async function init() {
  // Show tabs on mobile
  if (isMobile()) initTabs();

  await fetchStandings();
  setInterval(fetchStandings, CONFIG.POLL_MS);
})();

function connectSSE() {
  return;
}
connectSSE();
</script>

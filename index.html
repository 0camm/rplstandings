<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPL Standings</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8001d;
    --bg: #060608;
    --surface: #0d0d10;
    --surface2: #111115;
    --border: rgba(255,255,255,.06);
    --muted: #555;
    --text: #e8e8ee;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 58px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,6,8,.9);
    backdrop-filter: blur(20px);
  }

  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo img { width: 28px; height: 28px; object-fit: contain; }
  .nav-logo span { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: .06em; color: #fff; }
  .nav-logo span em { color: var(--red); font-style: normal; }

  /* PAGE HEADER */
  .page-header {
    padding: 52px 40px 36px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  }

  .page-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; color: var(--red);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  .page-eyebrow::before { content:''; width:18px; height:2px; background:var(--red); border-radius:2px; }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px,5vw,60px);
    letter-spacing: .03em; line-height: 1; color: #fff;
  }

  /* PLAYOFF KEY */
  .playoff-key {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin: 32px 40px;
  }

  .key-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
  }

  .key-dot {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }

  .key-dot.z    { background: #f59e0b; }
  .key-dot.x    { background: #22c55e; }
  .key-dot.pi   { background: #3b82f6; }
  .key-dot.e    { background: #555; }

  /* CONFERENCES */
  .conferences {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    padding: 0 40px 80px;
  }

  .conference { }

  .conf-header {
    display: flex; align-items: center; gap: 12px;
    padding: 28px 0 20px;
  }

  .conf-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px; letter-spacing: .12em;
    padding: 4px 10px; border-radius: 4px;
    color: #fff;
  }

  .conf-badge.east { background: rgba(232,0,29,.2); color: var(--red); border: 1px solid rgba(232,0,29,.3); }
  .conf-badge.west { background: rgba(59,130,246,.15); color: #60a5fa; border: 1px solid rgba(59,130,246,.25); }

  .conf-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: .04em; color: #fff;
  }

  /* DIVISION LABEL */
  .division-label {
    font-size: 10px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    padding: 6px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px;
  }

  .division-label::before { content:''; width:12px; height:1px; background:var(--muted); }

  /* STANDING TABLE */
  .standings-table {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .standings-table-header {
    display: grid;
    grid-template-columns: 28px 36px 1fr 48px 48px 70px 48px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .standings-table-header span {
    font-size: 10px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    text-align: center;
  }

  .standings-table-header span:nth-child(3) { text-align: left; }

  .standing-row {
    display: grid;
    grid-template-columns: 28px 36px 1fr 48px 48px 70px 48px;
    padding: 11px 16px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,.03);
    transition: background .15s;
    position: relative;
  }

  .standing-row:last-child { border-bottom: none; }
  .standing-row:hover { background: rgba(255,255,255,.03); }

  /* status stripe on left */
  .standing-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0;
  }

  .standing-row.status-z::before  { background: #f59e0b; }
  .standing-row.status-x::before  { background: #22c55e; }
  .standing-row.status-pi::before { background: #3b82f6; }
  .standing-row.status-e::before  { background: transparent; }

  .row-rank {
    font-size: 13px; font-weight: 600;
    color: var(--muted); text-align: center;
  }

  .row-logo img {
    width: 24px; height: 24px; object-fit: contain;
    display: block; margin: auto;
  }

  .row-team { }

  .row-team-name {
    font-size: 13px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .row-team-abbr {
    font-size: 10px; color: var(--muted); letter-spacing: .06em;
  }

  .row-w, .row-l, .row-pct, .row-gb {
    text-align: center; font-size: 13px;
  }

  .row-w { color: #22c55e; font-weight: 600; }
  .row-l { color: #ef4444; font-weight: 600; }
  .row-pct { color: #fff; font-weight: 600; }
  .row-gb { color: var(--muted); }

  /* status badge */
  .status-badge {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; letter-spacing: .06em;
    width: 20px; height: 20px; border-radius: 4px;
    flex-shrink: 0;
  }

  .status-badge.z  { background: rgba(245,158,11,.15); color: #f59e0b; }
  .status-badge.x  { background: rgba(34,197,94,.12);  color: #22c55e; }
  .status-badge.pi { background: rgba(59,130,246,.15); color: #60a5fa; }
  .status-badge.e  { display: none; }

  /* divider between groups */
  .group-divider {
    height: 1px; background: var(--border);
    margin: 4px 0;
  }

  /* eliminated style */
  .standing-row.status-e .row-team-name { color: #666; }
  .standing-row.status-e .row-w { color: #444; }
  .standing-row.status-e .row-l { color: #444; }
  .standing-row.status-e .row-pct { color: #444; }
</style>
</head>
<body>

<!-- PLAYOFF KEY -->
<div class="playoff-key">
  <div class="key-item"><div class="key-dot z"></div> z — 1 Seed (Conference Leader)</div>
  <div class="key-item"><div class="key-dot x"></div> x — Playoff Berth</div>
  <div class="key-item"><div class="key-dot pi"></div> pi — Play-In Berth</div>
  <div class="key-item"><div class="key-dot e"></div> e — Eliminated</div>
  <div class="key-item" style="margin-left:auto; color:#444; font-size:11px;">Playoff Eligibility: 7 matches played &nbsp;·&nbsp; NEGP = Not Enough Games Played</div>
</div>

<div class="conferences" id="conferences"></div>

<script>
/* ═══════════════════════════════════════════════════════
   HOW TO UPDATE STANDINGS:

   Each team object has:
   - name:   Full team name
   - abbr:   Short code shown under name
   - w:      Wins
   - l:      Losses
   - status: "z" | "x" | "pi" | "e" | ""
             z  = 1 seed
             x  = playoff berth
             pi = play-in
             e  = eliminated
             "" = no status yet

   The table auto-sorts by win % (desc), then wins (desc).
   GB (games back) is calculated automatically from the leader.

   To update: just change w, l, and status for each team.
═══════════════════════════════════════════════════════ */

const logos = {
  "Atlanta Hawks":"https://loodibee.com/wp-content/uploads/nba-atlanta-hawks-logo.png",
  "Boston Celtics":"https://loodibee.com/wp-content/uploads/nba-boston-celtics-logo.png",
  "Brooklyn Nets":"https://loodibee.com/wp-content/uploads/nba-brooklyn-nets-logo.png",
  "Charlotte Hornets":"https://loodibee.com/wp-content/uploads/nba-charlotte-hornets-logo.png",
  "Chicago Bulls":"https://loodibee.com/wp-content/uploads/nba-chicago-bulls-logo.png",
  "Cleveland Cavaliers":"https://loodibee.com/wp-content/uploads/nba-cleveland-cavaliers-logo.png",
  "Dallas Mavericks":"https://loodibee.com/wp-content/uploads/nba-dallas-mavericks-logo.png",
  "Denver Nuggets":"https://upload.wikimedia.org/wikipedia/en/thumb/7/76/Denver_Nuggets.svg/500px-Denver_Nuggets.svg.png",
  "Detroit Pistons":"https://loodibee.com/wp-content/uploads/nba-detroit-pistons-logo.png",
  "Golden State Warriors":"https://loodibee.com/wp-content/uploads/nba-golden-state-warriors-logo.png",
  "Houston Rockets":"https://loodibee.com/wp-content/uploads/nba-houston-rockets-logo.png",
  "Indiana Pacers":"https://loodibee.com/wp-content/uploads/nba-indiana-pacers-logo.png",
  "LA Clippers":"https://loodibee.com/wp-content/uploads/nba-la-clippers-logo.png",
  "Los Angeles Lakers":"https://loodibee.com/wp-content/uploads/nba-los-angeles-lakers-logo.png",
  "Memphis Grizzlies":"https://loodibee.com/wp-content/uploads/nba-memphis-grizzlies-logo.png",
  "Miami Heat":"https://loodibee.com/wp-content/uploads/nba-miami-heat-logo.png",
  "Milwaukee Bucks":"https://loodibee.com/wp-content/uploads/nba-milwaukee-bucks-logo.png",
  "Minnesota Timberwolves":"https://loodibee.com/wp-content/uploads/nba-minnesota-timberwolves-logo.png",
  "New Orleans Pelicans":"https://loodibee.com/wp-content/uploads/nba-new-orleans-pelicans-logo.png",
  "New York Knicks":"https://loodibee.com/wp-content/uploads/nba-new-york-knicks-logo.png",
  "Oklahoma City Thunder":"https://loodibee.com/wp-content/uploads/nba-oklahoma-city-thunder-logo.png",
  "Orlando Magic":"https://loodibee.com/wp-content/uploads/nba-orlando-magic-logo.png",
  "Philadelphia 76ers":"https://loodibee.com/wp-content/uploads/nba-philadelphia-76ers-logo.png",
  "Phoenix Suns":"https://loodibee.com/wp-content/uploads/nba-phoenix-suns-logo.png",
  "Portland Trail Blazers":"https://loodibee.com/wp-content/uploads/nba-portland-trail-blazers-logo.png",
  "Sacramento Kings":"https://loodibee.com/wp-content/uploads/nba-sacramento-kings-logo.png",
  "San Antonio Spurs":"https://loodibee.com/wp-content/uploads/nba-san-antonio-spurs-logo.png",
  "Toronto Raptors":"https://loodibee.com/wp-content/uploads/nba-toronto-raptors-logo.png",
  "Utah Jazz":"https://loodibee.com/wp-content/uploads/nba-utah-jazz-logo.png",
  "Washington Wizards":"https://loodibee.com/wp-content/uploads/nba-washington-wizards-logo.png"
};

/* ─────────────────────────────────────
   STANDINGS DATA — edit w, l, status
───────────────────────────────────── */
const conferences = [
  {
    name: "Eastern Conference",
    conf: "east",
    teams: [
      { name: "Atlanta Hawks",       abbr: "ATL", w: 0, l: 0, status: "" },
      { name: "Boston Celtics",      abbr: "BOS", w: 0, l: 0, status: "" },
      { name: "Brooklyn Nets",       abbr: "BKN", w: 0, l: 0, status: "" },
      { name: "Charlotte Hornets",   abbr: "CHA", w: 0, l: 0, status: "" },
      { name: "Chicago Bulls",       abbr: "CHI", w: 0, l: 0, status: "" },
      { name: "Cleveland Cavaliers", abbr: "CLE", w: 0, l: 0, status: "" },
      { name: "Detroit Pistons",     abbr: "DET", w: 0, l: 0, status: "" },
      { name: "Indiana Pacers",      abbr: "IND", w: 0, l: 0, status: "" },
      { name: "Miami Heat",          abbr: "MIA", w: 0, l: 0, status: "" },
      { name: "Milwaukee Bucks",     abbr: "MIL", w: 0, l: 0, status: "" },
      { name: "New York Knicks",     abbr: "NYK", w: 0, l: 0, status: "" },
      { name: "Orlando Magic",       abbr: "ORL", w: 0, l: 0, status: "" },
      { name: "Philadelphia 76ers",  abbr: "PHI", w: 0, l: 0, status: "" },
      { name: "Toronto Raptors",     abbr: "TOR", w: 0, l: 0, status: "" },
      { name: "Washington Wizards",  abbr: "WAS", w: 0, l: 0, status: "" },
    ]
  },
  {
    name: "Western Conference",
    conf: "west",
    teams: [
      { name: "Dallas Mavericks",       abbr: "DAL", w: 0, l: 0, status: "" },
      { name: "Denver Nuggets",         abbr: "DEN", w: 0, l: 0, status: "" },
      { name: "Golden State Warriors",  abbr: "GSW", w: 0, l: 0, status: "" },
      { name: "Houston Rockets",        abbr: "HOU", w: 0, l: 0, status: "" },
      { name: "LA Clippers",            abbr: "LAC", w: 0, l: 0, status: "" },
      { name: "Los Angeles Lakers",     abbr: "LAL", w: 0, l: 0, status: "" },
      { name: "Memphis Grizzlies",      abbr: "MEM", w: 0, l: 0, status: "" },
      { name: "Minnesota Timberwolves", abbr: "MIN", w: 0, l: 0, status: "" },
      { name: "New Orleans Pelicans",   abbr: "NOP", w: 0, l: 0, status: "" },
      { name: "Oklahoma City Thunder",  abbr: "OKC", w: 0, l: 0, status: "" },
      { name: "Phoenix Suns",           abbr: "PHX", w: 0, l: 0, status: "" },
      { name: "Portland Trail Blazers", abbr: "POR", w: 0, l: 0, status: "" },
      { name: "Sacramento Kings",       abbr: "SAC", w: 0, l: 0, status: "" },
      { name: "San Antonio Spurs",      abbr: "SAS", w: 0, l: 0, status: "" },
      { name: "Utah Jazz",              abbr: "UTA", w: 0, l: 0, status: "" },
    ]
  }
];

/* ── RENDER ── */
function pct(w, l) {
  const gp = w + l;
  if (gp === 0) return null;
  return w / gp;
}

function fmtPct(w, l) {
  const p = pct(w, l);
  if (p === null) return '—';
  return p.toFixed(3).replace(/^0/, '');
}

function calcGB(leaderW, leaderL, w, l) {
  const gb = ((leaderW - w) + (l - leaderL)) / 2;
  if (gb === 0) return '—';
  return gb % 1 === 0 ? gb.toFixed(0) : gb.toFixed(1);
}

function render() {
  const container = document.getElementById('conferences');
  container.innerHTML = conferences.map(conf => {
    // sort by win%, then wins
    const sorted = [...conf.teams].sort((a, b) => {
      const pa = pct(a.w, a.l) ?? -1;
      const pb = pct(b.w, b.l) ?? -1;
      if (pb !== pa) return pb - pa;
      return b.w - a.w;
    });

    const leader = sorted[0];

    const rows = sorted.map((team, i) => {
      const gb = i === 0 ? '—' : calcGB(leader.w, leader.l, team.w, team.l);
      const statusCls = team.status ? `status-${team.status}` : '';
      const badgeCls  = team.status || 'e';

      return `
        <div class="standing-row ${statusCls}">
          <span class="row-rank">${i + 1}</span>
          <span class="row-logo"><img src="${logos[team.name]}" alt="${team.abbr}" loading="lazy"></span>
          <span class="row-team">
            <div class="row-team-name">${team.name}</div>
            <div class="row-team-abbr">${team.abbr} <span class="status-badge ${badgeCls}">${team.status.toUpperCase() || ''}</span></div>
          </span>
          <span class="row-w">${team.w}</span>
          <span class="row-l">${team.l}</span>
          <span class="row-pct">${fmtPct(team.w, team.l)}</span>
          <span class="row-gb">${gb}</span>
        </div>
      `;
    }).join('');

    return `
      <div class="conference">
        <div class="conf-header">
          <span class="conf-badge ${conf.conf}">${conf.conf === 'east' ? 'EAST' : 'WEST'}</span>
          <span class="conf-title">${conf.name}</span>
        </div>
        <div class="standings-table">
          <div class="standings-table-header">
            <span>#</span>
            <span></span>
            <span>Team</span>
            <span>W</span>
            <span>L</span>
            <span>PCT</span>
            <span>GB</span>
          </div>
          ${rows}
        </div>
      </div>
    `;
  }).join('');
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPL Standings — Season 10</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red:     #e8001d;
    --bg:      #06060a;
    --surface: #0e0e14;
    --surface2:#131319;
    --surface3:#18181f;
    --border:  rgba(255,255,255,.07);
    --border2: rgba(255,255,255,.04);
    --muted:   #52525e;
    --muted2:  #3a3a45;
    --text:    #e2e2ea;
    --green:   #22c55e;
    --amber:   #f59e0b;
    --blue:    #3b82f6;
    --win-col: #4ade80;
    --los-col: #f87171;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top:0; z-index:100;
    display: flex; align-items:center; justify-content:space-between;
    padding: 0 36px; height: 56px;
    background: rgba(6,6,10,.9);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
  }
  .nav-brand {
    display: flex; align-items:center; gap:10px;
    text-decoration: none;
  }
  .nav-brand-icon {
    width:30px; height:30px; border-radius:6px;
    background: var(--red);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:16px; color:#fff;
    letter-spacing:.04em;
  }
  .nav-brand-text {
    font-family:'Bebas Neue',sans-serif;
    font-size:18px; letter-spacing:.08em; color:#fff;
  }
  .nav-brand-text em { color:var(--red); font-style:normal; }
  .nav-season {
    font-size:11px; font-weight:500; color:var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius:20px; padding:3px 10px; letter-spacing:.06em;
  }
  .nav-right { display:flex; align-items:center; gap:14px; }
  .live-pill {
    display:flex; align-items:center; gap:6px;
    font-size:11px; font-weight:600; letter-spacing:.1em;
    color:var(--muted); text-transform:uppercase; transition:color .3s;
  }
  .live-pill.live { color:var(--green); }
  .live-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--muted); flex-shrink:0; transition:background .3s;
  }
  .live-pill.live .live-dot { background:var(--green); animation:pulse 1.8s ease infinite; }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:.35;transform:scale(.65);}
  }
  .last-sync { font-size:11px; color:var(--muted); }

  /* ── PAGE BODY ── */
  .page-wrap { max-width:1400px; margin:0 auto; padding:0 28px 80px; }

  /* ── HERO STRIP ── */
  .hero-strip {
    display:flex; align-items:center; justify-content:space-between;
    padding:28px 0 0;
    border-bottom: 1px solid var(--border2);
    margin-bottom: 24px;
    padding-bottom: 20px;
  }
  .hero-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:32px; letter-spacing:.04em; color:#fff;
    line-height:1;
  }
  .hero-title em { color:var(--red); font-style:normal; }
  .hero-sub { font-size:12px; color:var(--muted); margin-top:4px; }

  /* ── PLAYOFF KEY ── */
  .playoff-key {
    display:flex; flex-wrap:wrap; gap:20px;
    align-items:center;
  }
  .key-item { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); }
  .key-pip { width:3px; height:16px; border-radius:2px; flex-shrink:0; }
  .key-pip.z  { background:var(--amber); }
  .key-pip.x  { background:var(--green); }
  .key-pip.pi { background:var(--blue); }
  .key-pip.e  { background:var(--muted2); }

  /* ── STATE BANNER ── */
  .state-banner {
    display:none; margin-top:16px;
    padding:12px 18px; border-radius:8px;
    font-size:13px; color:var(--muted);
    background:var(--surface); border:1px solid var(--border);
  }
  .state-banner.show { display:block; }

  /* ── RESULTS STRIP ── */
  #results-strip { margin-top:20px; display:none; }
  .results-strip-inner {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }
  .results-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:11px 18px;
    border-bottom:1px solid var(--border);
    background:var(--surface2);
  }
  .results-header-title {
    font-size:10px; font-weight:700; letter-spacing:.12em;
    text-transform:uppercase; color:var(--muted);
  }
  .results-header-title em { color:var(--red); font-style:normal; margin-left:4px; }
  .results-list {
    display:flex; overflow-x:auto;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .results-list::-webkit-scrollbar { display:none; }

  .result-card {
    display:flex; align-items:center; flex-shrink:0;
    padding:14px 20px; min-width:220px;
    border-right:1px solid var(--border2);
    position:relative; transition:background .15s;
  }
  .result-card:last-child { border-right:none; }
  .result-card:hover { background:rgba(255,255,255,.02); }
  .result-card::before {
    content:''; position:absolute;
    top:0; left:0; right:0; height:2px;
  }
  .result-card.final::before    { background:var(--green); }
  .result-card.forfeit::before  { background:var(--amber); }
  .result-card.incomplete::before { background:var(--muted2); }

  .result-teams { flex:1; display:flex; flex-direction:column; gap:5px; }
  .result-row { display:flex; align-items:center; gap:8px; }
  .result-logo { width:18px; height:18px; object-fit:contain; flex-shrink:0; }
  .result-abbr {
    font-family:'Bebas Neue',sans-serif;
    font-size:14px; letter-spacing:.05em; color:#fff; width:38px;
  }
  .result-score {
    font-size:14px; font-weight:700; color:#fff;
    width:26px; text-align:right; font-variant-numeric:tabular-nums;
  }
  .result-score.winner { color:var(--win-col); }
  .result-score.loser  { color:var(--muted); }
  .result-meta {
    display:flex; flex-direction:column; align-items:flex-end; gap:4px; margin-left:14px;
  }
  .result-badge {
    font-size:9px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; padding:3px 7px; border-radius:4px; white-space:nowrap;
  }
  .result-badge.final      { background:rgba(34,197,94,.12); color:var(--green); }
  .result-badge.forfeit    { background:rgba(245,158,11,.12); color:var(--amber); }
  .result-badge.incomplete { background:rgba(82,82,94,.15); color:var(--muted); }
  .result-badge.ot         { background:rgba(59,130,246,.12); color:var(--blue); }
  .result-note { font-size:10px; color:var(--muted); max-width:110px; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* ── CONFERENCES GRID ── */
  .conferences {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px;
    margin-top:28px;
  }

  .conf-header {
    display:flex; align-items:center; gap:10px;
    margin-bottom:12px;
  }
  .conf-badge {
    font-family:'Bebas Neue',sans-serif;
    font-size:10px; letter-spacing:.14em; padding:4px 10px;
    border-radius:4px; color:#fff;
  }
  .conf-badge.east { background:rgba(232,0,29,.18); color:var(--red); border:1px solid rgba(232,0,29,.28); }
  .conf-badge.west { background:rgba(59,130,246,.15); color:#60a5fa; border:1px solid rgba(59,130,246,.25); }
  .conf-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:22px; letter-spacing:.04em; color:#fff;
  }

  /* ── STANDINGS TABLE ── */
  .standings-table {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }

  /* columns: # | logo | team | W | L | PCT | STRK */
  .tbl-cols { grid-template-columns: 26px 32px 1fr 42px 42px 62px 56px; }

  .standings-table-header {
    display:grid; padding:9px 14px;
    border-bottom:1px solid var(--border);
    background:var(--surface2);
  }
  .standings-table-header.tbl-cols {}
  .standings-table-header span {
    font-size:10px; font-weight:600; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted); text-align:center;
  }
  .standings-table-header span:nth-child(3) { text-align:left; padding-left:2px; }

  .standing-row {
    display:grid; padding:10px 14px;
    align-items:center;
    border-bottom:1px solid var(--border2);
    position:relative; transition:background .15s;
  }
  .standing-row.tbl-cols {}
  .standing-row:last-child { border-bottom:none; }
  .standing-row:hover { background:rgba(255,255,255,.025); }
  .standing-row::before {
    content:''; position:absolute;
    left:0; top:0; bottom:0; width:3px; border-radius:0 2px 2px 0;
  }
  .standing-row.status-z::before  { background:var(--amber); }
  .standing-row.status-x::before  { background:var(--green); }
  .standing-row.status-pi::before { background:var(--blue); }

  @keyframes rowFlash {
    0%   { background:rgba(232,0,29,.15); }
    100% { background:transparent; }
  }
  .standing-row.updated { animation:rowFlash 1.6s ease forwards; }

  .row-rank { font-size:12px; font-weight:600; color:var(--muted); text-align:center; }
  .row-logo img { width:22px; height:22px; object-fit:contain; display:block; margin:auto; }
  .row-logo .logo-placeholder {
    width:22px; height:22px; border-radius:50%;
    background:var(--surface3); display:block; margin:auto;
  }
  .row-team-name {
    font-size:13px; font-weight:600; color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .row-team-meta {
    display:flex; align-items:center; gap:5px; margin-top:1px;
  }
  .row-team-abbr { font-size:10px; color:var(--muted); letter-spacing:.05em; }
  .status-badge {
    display:inline-flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700; letter-spacing:.06em;
    height:15px; padding:0 5px; border-radius:3px; flex-shrink:0;
  }
  .status-badge.z  { background:rgba(245,158,11,.15); color:var(--amber); }
  .status-badge.x  { background:rgba(34,197,94,.12); color:var(--green); }
  .status-badge.pi { background:rgba(59,130,246,.15); color:#60a5fa; }
  .status-badge.e  { display:none; }

  .row-w   { text-align:center; font-size:13px; color:var(--win-col); font-weight:600; font-variant-numeric:tabular-nums; }
  .row-l   { text-align:center; font-size:13px; color:var(--los-col); font-weight:600; font-variant-numeric:tabular-nums; }
  .row-pct { text-align:center; font-size:12px; color:var(--text); font-variant-numeric:tabular-nums; }
  .row-strk {
    text-align:center; font-size:12px; font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .row-strk.win  { color:var(--win-col); }
  .row-strk.loss { color:var(--los-col); }
  .row-strk.none { color:var(--muted); }

  .standing-row.status-e .row-team-name,
  .standing-row.status-e .row-w,
  .standing-row.status-e .row-l,
  .standing-row.status-e .row-pct,
  .standing-row.status-e .row-strk { color:#444; }

  /* ── TOAST ── */
  #toast-container {
    position:fixed; bottom:24px; right:24px;
    display:flex; flex-direction:column; gap:8px;
    z-index:9999; pointer-events:none;
  }
  .toast {
    background:var(--surface2);
    border:1px solid var(--border);
    border-left:3px solid var(--red);
    border-radius:8px; padding:11px 16px;
    font-size:13px; color:#fff;
    box-shadow:0 8px 32px rgba(0,0,0,.5);
    animation:toastIn .22s ease forwards;
    pointer-events:all; max-width:300px;
  }
  .toast.green { border-left-color:var(--green); }
  .toast.amber { border-left-color:var(--amber); }
  @keyframes toastIn  { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
  @keyframes toastOut { from{opacity:1;}to{opacity:0;transform:translateY(-6px);} }
  .toast.dying { animation:toastOut .22s ease forwards; }

  /* ══════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════ */
  @media (max-width: 1100px) {
    .conferences { grid-template-columns:1fr; gap:20px; }
    .conferences .tbl-cols { grid-template-columns:26px 32px 1fr 40px 40px 58px 52px; }
  }
  @media (max-width: 760px) {
    .page-wrap { padding:0 14px 80px; }
    nav { padding:0 16px; }
    .hero-strip { flex-direction:column; align-items:flex-start; gap:14px; padding-bottom:16px; }
    .hero-title { font-size:26px; }
    .playoff-key { gap:14px; }
    .result-card { min-width:190px; padding:12px 14px; }
    .tbl-cols,
    .standings-table-header.tbl-cols,
    .standing-row.tbl-cols {
      grid-template-columns:22px 28px 1fr 38px 38px 54px 48px;
      padding-left:10px; padding-right:10px;
    }
  }
  @media (max-width: 500px) {
    .hero-title { font-size:22px; }
    .conf-title { font-size:19px; }
    /* Hide streak on very small screens */
    .tbl-cols,
    .standings-table-header.tbl-cols,
    .standing-row.tbl-cols {
      grid-template-columns:20px 0 1fr 36px 36px 52px 0;
    }
    .row-logo, .row-strk,
    .standings-table-header span:nth-child(2),
    .standings-table-header span:last-child { display:none; }
    .row-team-name { font-size:12px; }
  }
</style>
</head>
<body>

<nav>
  <span class="nav-season">Season 10</span>
  <div class="nav-right">
    <span class="last-sync" id="last-sync">Never synced</span>
    <span class="live-pill" id="live-pill">
      <span class="live-dot"></span>
      <span id="live-label">Offline</span>
    </span>
  </div>
</nav>

<div class="page-wrap">

  <div class="hero-strip">
    <div>
      <div class="hero-title"><em>2024–25</em> RPL Standings</div>
      <div class="hero-sub">Live standings · Updates after every game</div>
    </div>
    <div class="playoff-key">
      <div class="key-item"><div class="key-pip z"></div> z – Conference Leader</div>
      <div class="key-item"><div class="key-pip x"></div> x – Playoff Berth</div>
      <div class="key-item"><div class="key-pip pi"></div> pi – Play-In</div>
      <div class="key-item"><div class="key-pip e"></div> e – Eliminated</div>
    </div>
  </div>

  <div class="state-banner" id="state-banner"></div>

  <div id="results-strip">
    <div class="results-strip-inner">
      <div class="results-header">
        <span class="results-header-title">Recent Results <em>●</em></span>
      </div>
      <div class="results-list" id="results-list"></div>
    </div>
  </div>

  <div class="conferences" id="conferences"></div>

</div>

<div id="toast-container"></div>

<script>
const CONFIG = { API_URL:'https://rplstandings.onrender.com/rpl/standings', POLL_MS:30000 };

const LOGOS_BY_ABB = {
  ATL:"https://a.espncdn.com/i/teamlogos/nba/500/atl.png",
  BOS:"https://a.espncdn.com/i/teamlogos/nba/500/bos.png",
  BKN:"https://a.espncdn.com/i/teamlogos/nba/500/bkn.png",
  CHA:"https://a.espncdn.com/i/teamlogos/nba/500/cha.png",
  CHI:"https://a.espncdn.com/i/teamlogos/nba/500/chi.png",
  CLE:"https://a.espncdn.com/i/teamlogos/nba/500/cle.png",
  DAL:"https://a.espncdn.com/i/teamlogos/nba/500/dal.png",
  DEN:"https://a.espncdn.com/i/teamlogos/nba/500/den.png",
  DET:"https://a.espncdn.com/i/teamlogos/nba/500/det.png",
  GSW:"https://a.espncdn.com/i/teamlogos/nba/500/gs.png",
  HOU:"https://a.espncdn.com/i/teamlogos/nba/500/hou.png",
  IND:"https://a.espncdn.com/i/teamlogos/nba/500/ind.png",
  LAC:"https://a.espncdn.com/i/teamlogos/nba/500/lac.png",
  LAL:"https://a.espncdn.com/i/teamlogos/nba/500/lal.png",
  MEM:"https://a.espncdn.com/i/teamlogos/nba/500/mem.png",
  MIA:"https://a.espncdn.com/i/teamlogos/nba/500/mia.png",
  MIL:"https://a.espncdn.com/i/teamlogos/nba/500/mil.png",
  MIN:"https://a.espncdn.com/i/teamlogos/nba/500/min.png",
  NOP:"https://a.espncdn.com/i/teamlogos/nba/500/no.png",
  NYK:"https://a.espncdn.com/i/teamlogos/nba/500/ny.png",
  OKC:"https://a.espncdn.com/i/teamlogos/nba/500/okc.png",
  ORL:"https://a.espncdn.com/i/teamlogos/nba/500/orl.png",
  PHI:"https://a.espncdn.com/i/teamlogos/nba/500/phi.png",
  PHX:"https://a.espncdn.com/i/teamlogos/nba/500/phx.png",
  POR:"https://a.espncdn.com/i/teamlogos/nba/500/por.png",
  SAC:"https://a.espncdn.com/i/teamlogos/nba/500/sac.png",
  SAS:"https://a.espncdn.com/i/teamlogos/nba/500/sa.png",
  TOR:"https://a.espncdn.com/i/teamlogos/nba/500/tor.png",
  UTAH:"https://a.espncdn.com/i/teamlogos/nba/500/utah.png",
  WAS:"https://a.espncdn.com/i/teamlogos/nba/500/wsh.png",
};

const ABB_TO_NAME = {
  ATL:"Atlanta Hawks",BOS:"Boston Celtics",BKN:"Brooklyn Nets",CHA:"Charlotte Hornets",
  CHI:"Chicago Bulls",CLE:"Cleveland Cavaliers",DAL:"Dallas Mavericks",DEN:"Denver Nuggets",
  DET:"Detroit Pistons",GSW:"Golden State Warriors",HOU:"Houston Rockets",IND:"Indiana Pacers",
  LAC:"LA Clippers",LAL:"Los Angeles Lakers",MEM:"Memphis Grizzlies",MIA:"Miami Heat",
  MIL:"Milwaukee Bucks",MIN:"Minnesota Timberwolves",NOP:"New Orleans Pelicans",NYK:"New York Knicks",
  OKC:"Oklahoma City Thunder",ORL:"Orlando Magic",PHI:"Philadelphia 76ers",PHX:"Phoenix Suns",
  POR:"Portland Trail Blazers",SAC:"Sacramento Kings",SAS:"San Antonio Spurs",TOR:"Toronto Raptors",
  UTAH:"Utah Jazz",WAS:"Washington Wizards"
};

const EASTERN = new Set(["ATL","BOS","BKN","CHA","CHI","CLE","DET","IND","MIA","MIL","NYK","ORL","PHI","TOR","WAS"]);
const WESTERN = new Set(["DAL","DEN","GSW","HOU","LAC","LAL","MEM","MIN","NOP","OKC","PHX","POR","SAC","SAS","UTAH"]);

let prevStandings = null;
let consecutiveFails = 0;
let lastResultId = null;

function fmtPct(w, l) {
  const gp = w + l;
  if (gp === 0) return '—';
  return (w / gp).toFixed(3).replace(/^0/, '');
}

function timeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function showToast(msg, colour='red', duration=5000) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${colour}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('dying'); setTimeout(()=>t.remove(),250); }, duration);
}

function setLive(v) {
  const pill  = document.getElementById('live-pill');
  const label = document.getElementById('live-label');
  pill.classList.toggle('live', v);
  label.textContent = v ? 'Live' : 'Offline';
}

function setLastSync(iso) {
  document.getElementById('last-sync').textContent = iso ? `Updated ${timeAgo(iso)}` : '';
}

/* ── Results strip ── */
function renderResults(games) {
  const strip = document.getElementById('results-strip');
  const list  = document.getElementById('results-list');
  if (!games || !games.length) { strip.style.display='none'; return; }
  strip.style.display='block';

  list.innerHTML = games.slice(0,6).map(g => {
    const homeWin = g.homeScore > g.awayScore;
    const st = (g.status||'final').toLowerCase();
    let badgeLabel = st.toUpperCase(), badgeCls = st;
    if (st==='final' && g.quarter==='OT') { badgeLabel='FINAL/OT'; badgeCls='ot'; }
    if (st==='incomplete') badgeLabel='NO RESULT';

    const awayLogo = g.awayLogo || LOGOS_BY_ABB[g.awayABB] || '';
    const homeLogo = g.homeLogo || LOGOS_BY_ABB[g.homeABB] || '';

    return `<div class="result-card ${st}">
      <div class="result-teams">
        <div class="result-row">
          ${awayLogo ? `<img class="result-logo" src="${awayLogo}" alt="${g.awayABB}">` : ''}
          <span class="result-abbr">${g.awayABB||'???'}</span>
          <span class="result-score ${!homeWin?'winner':'loser'}">${g.awayScore??'—'}</span>
        </div>
        <div class="result-row">
          ${homeLogo ? `<img class="result-logo" src="${homeLogo}" alt="${g.homeABB}">` : ''}
          <span class="result-abbr">${g.homeABB||'???'}</span>
          <span class="result-score ${homeWin?'winner':'loser'}">${g.homeScore??'—'}</span>
        </div>
      </div>
      <div class="result-meta">
        <span class="result-badge ${badgeCls}">${badgeLabel}</span>
        ${g.note ? `<span class="result-note">${g.note}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ── Streak cell helper ── */
function streakCell(raw) {
  if (!raw || raw === '—') return `<span class="row-strk none">—</span>`;
  const letter = raw[0];
  const cls    = letter === 'W' ? 'win' : 'loss';
  return `<span class="row-strk ${cls}">${raw}</span>`;
}

/* ── Standings ── */
function buildStandingsFromFlat(flatTeams) {
  const east = [], west = [], other = [];
  for (const t of flatTeams) {
    const entry = {
      name:   ABB_TO_NAME[t.abb] || t.abb,
      abbr:   t.abb,
      w:      t.wins   || 0,
      l:      t.losses || 0,
      status: t.status || '',
      logo:   t.logo   || LOGOS_BY_ABB[t.abb] || '',
      streak: t.streak || '—',
    };
    if (EASTERN.has(t.abb))      east.push(entry);
    else if (WESTERN.has(t.abb)) west.push(entry);
    else                         other.push(entry);
  }
  // unknown teams spill into west
  return { eastern: east, western: [...west, ...other] };
}

function sortTeams(teams) {
  return [...teams].sort((a,b) => {
    if (b.w !== a.w) return b.w - a.w;
    return a.l - b.l;
  });
}

function renderConferences(data) {
  const container = document.getElementById('conferences');
  let sd = Array.isArray(data.standings)
    ? buildStandingsFromFlat(data.standings)
    : (data.standings || { eastern:[], western:[] });

  // detect changes
  const changed = new Set();
  if (prevStandings) {
    for (const ck of ['eastern','western']) {
      for (const team of (sd[ck]||[])) {
        const p = (prevStandings[ck]||[]).find(t => t.abbr===team.abbr);
        if (!p || p.w!==team.w || p.l!==team.l || p.status!==team.status || p.streak!==team.streak)
          changed.add(team.abbr);
      }
    }
  }

  const confDefs = [
    { key:'eastern', name:'Eastern Conference', cls:'east', badge:'EAST' },
    { key:'western', name:'Western Conference', cls:'west', badge:'WEST' },
  ];

  container.innerHTML = confDefs.map(conf => {
    const teams = sortTeams(sd[conf.key] || []);

    const rows = teams.map((team, i) => {
      const stsCls  = team.status ? `status-${team.status}` : 'status-e';
      const badgeCls = team.status || 'e';
      const flash    = changed.has(team.abbr) ? ' updated' : '';
      const logo     = team.logo || LOGOS_BY_ABB[team.abbr] || '';
      const logoEl   = logo
        ? `<img src="${logo}" alt="${team.abbr}" loading="lazy">`
        : `<div class="logo-placeholder"></div>`;

      return `<div class="standing-row tbl-cols ${stsCls}${flash}" data-abbr="${team.abbr}">
        <span class="row-rank">${i+1}</span>
        <span class="row-logo">${logoEl}</span>
        <span class="row-team">
          <div class="row-team-name">${team.name}</div>
          <div class="row-team-meta">
            <span class="row-team-abbr">${team.abbr}</span>
            <span class="status-badge ${badgeCls}">${(team.status||'').toUpperCase()}</span>
          </div>
        </span>
        <span class="row-w">${team.w}</span>
        <span class="row-l">${team.l}</span>
        <span class="row-pct">${fmtPct(team.w, team.l)}</span>
        ${streakCell(team.streak)}
      </div>`;
    }).join('');

    return `<div class="conference">
      <div class="conf-header">
        <span class="conf-badge ${conf.cls}">${conf.badge}</span>
        <span class="conf-title">${conf.name}</span>
      </div>
      <div class="standings-table">
        <div class="standings-table-header tbl-cols">
          <span>#</span><span></span><span>Team</span>
          <span>W</span><span>L</span><span>PCT</span><span>STRK</span>
        </div>
        ${rows}
      </div>
    </div>`;
  }).join('');

  // remove flash class after animation
  setTimeout(() => {
    document.querySelectorAll('.standing-row.updated')
      .forEach(el => el.classList.remove('updated'));
  }, 1700);

  prevStandings = JSON.parse(JSON.stringify(sd));
}

/* ── Fetch ── */
async function fetchStandings() {
  try {
    const res  = await fetch(CONFIG.API_URL, { cache:'no-store', headers:{'Accept':'application/json'} });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    consecutiveFails = 0;
    setLive(true);
    setLastSync(data.lastUpdated || new Date().toISOString());
    document.getElementById('state-banner').classList.remove('show');

    // toast only when a NEW result arrives
    if (data.results?.length) {
      const latest = data.results[0];
      if (latest && latest.id && latest.id !== lastResultId && prevStandings) {
        lastResultId = latest.id;
        const st = latest.status;
        showToast(
          `${latest.awayABB} @ ${latest.homeABB} — ${
            st==='final'      ? `${latest.awayScore}–${latest.homeScore} FINAL` :
            st==='forfeit'    ? 'FORFEIT' :
            st==='incomplete' ? 'NO RESULT' : st.toUpperCase()
          }`,
          st==='forfeit' ? 'amber' : 'green', 6000
        );
      }
      if (!lastResultId) lastResultId = latest?.id;
    }

    renderResults(data.results || []);
    renderConferences(data);

  } catch(err) {
    consecutiveFails++;
    console.warn('[RPL] Fetch failed:', err.message);
    if (consecutiveFails >= 3) {
      setLive(false);
      const b = document.getElementById('state-banner');
      b.textContent = `⚠ Standings server unreachable — showing last known data. (${err.message})`;
      b.classList.add('show');
    }
    if (!prevStandings) renderConferences({ standings:[] });
  }
}

/* ── SSE live push ── */
function connectSSE() {
  if (typeof EventSource === 'undefined') return;
  const url = CONFIG.API_URL.replace(/\/standings$/, '/standings/events');
  const es  = new EventSource(url);
  es.addEventListener('standings', () => fetchStandings());
  es.addEventListener('result',    () => fetchStandings());
  es.onerror = () => es.close();
}

/* ── Init ── */
(async () => {
  await fetchStandings();
  setInterval(fetchStandings, CONFIG.POLL_MS);
  connectSSE();
})();
</script>
